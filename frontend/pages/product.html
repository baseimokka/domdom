<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="apple-touch-icon" href="/images/favicon.png">
<!--SSR_META_START-->
<title>Product — DomDom Store</title>
<meta name="description" id="meta-description" content="Shop premium cruelty-free beauty at DomDom Store. Cash on delivery across Egypt.">
<link rel="canonical" id="canonical-link" href="https://domdom-store.com/shop">
<meta name="robots" content="index,follow">
<meta property="og:type" content="product">
<meta property="og:site_name" content="DomDom Store">
<meta property="og:title" id="og-title" content="DomDom Store">
<meta property="og:description" id="og-desc" content="Premium cruelty-free beauty. Cash on delivery across Egypt.">
<meta property="og:url" id="og-url" content="https://domdom-store.com/shop">
<meta property="og:image" id="og-image" content="https://domdom-store.com/images/favicon.png">
<meta name="twitter:card" content="summary_large_image">
<!--SSR_META_END-->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/nav.css">
<link rel="stylesheet" href="/css/shop.css">
<style>
@keyframes galleryFadeIn{from{opacity:0}to{opacity:1}}
.gallery-main img{animation:galleryFadeIn .28s ease}
.color-dot{width:30px!important;height:30px!important}
.color-dot.selected{box-shadow:0 0 0 3px #fff,0 0 0 5px var(--charcoal)}
.color-dot.selected,
.color-dot:hover{transform:scale(1.1)!important;border-color:transparent!important}
</style>
</head>
<body>
<nav id="main-nav"></nav>

<div class="container" style="padding-top:6rem;padding-bottom:4rem">

  <div class="breadcrumb" id="breadcrumb">
    <a href="/">Home</a><span>/</span>
    <a href="/shop">Shop</a><span>/</span>
    <span id="bc-name">Loading…</span>
  </div>

  <!-- Main product area -->
  <div id="product-detail-area">
    <div class="spinner"></div>
  </div>

  <!-- Reviews -->
  <div class="reviews-section" id="reviews-section" style="display:none">
    <div class="reviews-header">
      <h2 class="section-title">Customer Reviews</h2>
      <button class="btn btn-outline btn-sm" id="write-review-btn">✍️ Write a Review</button>
    </div>
    <div class="reviews-summary" id="reviews-summary"></div>
    <div class="reviews-list"   id="reviews-list"></div>

    <div id="review-form-wrap"
      style="display:none;margin-top:2rem;background:white;border-radius:var(--r-lg);padding:2rem">
      <h3 style="font-size:1.2rem;margin-bottom:1.2rem">Your Review</h3>
      <div class="form-group">
        <label>Rating</label>
        <div id="star-picker" style="display:flex;gap:.4rem;font-size:2rem;cursor:pointer">
          <span class="star-pick" data-v="1">☆</span>
          <span class="star-pick" data-v="2">☆</span>
          <span class="star-pick" data-v="3">☆</span>
          <span class="star-pick" data-v="4">☆</span>
          <span class="star-pick" data-v="5">☆</span>
        </div>
      </div>
      <div class="form-group">
        <label>Your Review</label>
        <textarea class="form-control" id="review-text" rows="4"
          placeholder="Share your experience with this product…"
          style="resize:vertical"></textarea>
      </div>
      <button class="btn btn-primary" id="submit-review-btn">Submit Review</button>
    </div>
  </div>

  <!-- Related products -->
  <div class="related-section" id="related-section" style="display:none">
    <p class="section-label">You May Also Like</p>
    <h2 class="section-title">Related Products</h2>
    <div class="related-grid" id="related-grid"></div>
  </div>

</div>

<footer id="main-footer"></footer>
<div id="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/layout.js"></script>
<script>
// ── State
let product          = null;
let selectedColorIdx = 0;
let qty              = 1;
let selectedRating   = 0;

// ── Boot
document.addEventListener('DOMContentLoaded', async () => {
  await initLayout();

  // ── Product id from the clean path /product/:slug (slug = name-<id>);
  // fall back to the legacy ?id= query for any old in-flight links.
  const productId = parseProductId(window.location.pathname)
    || new URLSearchParams(window.location.search).get('id');

  if (!productId) {
    showError('No product specified. <a href="/shop">Back to Shop</a>');
    return;
  }

  await loadProduct(productId);
});

// ── Load product from API
async function loadProduct(id) {
  try {
    const d   = await API.getProduct(id);
    product   = d.product;

    // Update page meta
    document.title = `${product.name} — DomDom Store`;
    document.getElementById('bc-name').textContent = product.name;
    applyProductSeo(product);

    // Render sections
    renderDetail(product);
    await loadReviews(String(product._id));
    renderRelated(d.related || []);

    document.getElementById('reviews-section').style.display = 'block';
    if (d.related?.length) document.getElementById('related-section').style.display = 'block';

    initReveal();
  } catch (err) {
    showError(`Product not found. <a href="/shop" style="color:var(--rose)">Back to Shop</a>`);
  }
}

function showError(html) {
  document.getElementById('product-detail-area').innerHTML =
    `<p style="text-align:center;color:var(--muted);padding:5rem 2rem">${html}</p>`;
}

// ── Per-product SEO: canonical, Open Graph, JSON-LD, and a pretty-URL upgrade.
// The page may be reached at /product/<id> (e.g. from a 301 of an old ?id= link)
// or /product/<name>-<id>; either way we settle on the canonical slug URL.
function absUrl(u) {
  if (!u) return `${SITE_URL}/images/favicon.png`;
  return /^https?:\/\//i.test(u) ? u : `${SITE_URL}${u.startsWith('/') ? '' : '/'}${u}`;
}

function applyProductSeo(p) {
  const cleanPath = productUrl(p);                 // /product/<name>-<id>
  const url       = `${SITE_URL}${cleanPath}`;
  const img       = absUrl(getProductImage(p));
  const desc      = (p.description || `Shop ${p.name} at DomDom Store — premium cruelty-free beauty with cash on delivery across Egypt.`)
                      .replace(/\s+/g, ' ').trim().slice(0, 160);

  // Upgrade the address bar to the canonical slug URL without a reload/redirect.
  if (window.location.pathname !== cleanPath) {
    history.replaceState(null, '', cleanPath + window.location.search);
  }

  const set = (id, attr, val) => { const el = document.getElementById(id); if (el) el.setAttribute(attr, val); };
  set('canonical-link', 'href', url);
  set('meta-description', 'content', desc);
  set('og-title', 'content', `${p.name} — DomDom Store`);
  set('og-desc', 'content', desc);
  set('og-url', 'content', url);
  set('og-image', 'content', img);

  const ld = {
    '@context': 'https://schema.org/',
    '@type': 'Product',
    name: p.name,
    image: [img],
    description: desc,
    brand: { '@type': 'Brand', name: p.brand || 'DomDom' },
    category: p.category || undefined,
    sku: p.sku || undefined,
    offers: {
      '@type': 'Offer',
      url,
      priceCurrency: 'EGP',
      price: Number(p.finalPrice).toFixed(2),
      availability: (p.stock > 0) ? 'https://schema.org/InStock' : 'https://schema.org/OutOfStock'
    }
  };
  if (p.reviewCount > 0 && p.rating > 0) {
    ld.aggregateRating = {
      '@type': 'AggregateRating',
      ratingValue: Number(p.rating).toFixed(1),
      reviewCount: p.reviewCount
    };
  }

  const breadcrumb = {
    '@context': 'https://schema.org/',
    '@type': 'BreadcrumbList',
    itemListElement: [
      { '@type': 'ListItem', position: 1, name: 'Home', item: `${SITE_URL}/` },
      { '@type': 'ListItem', position: 2, name: 'Shop', item: `${SITE_URL}/shop` },
      { '@type': 'ListItem', position: 3, name: p.name, item: url }
    ]
  };

  let tag = document.getElementById('product-jsonld');
  if (!tag) {
    tag = document.createElement('script');
    tag.type = 'application/ld+json';
    tag.id = 'product-jsonld';
    document.head.appendChild(tag);
  }
  tag.textContent = JSON.stringify([ld, breadcrumb]);
}

// ── Get images for a given color index
function getColorImages(p, idx) {
  const color = p.colors?.[idx];
  if (color?.images?.length) return color.images;
  // fallback: all images across all colors
  return (p.colors || []).flatMap(c => c.images || []);
}

// A product only has selectable shades if its colors carry a real hex.
// Color-less products get an auto image-holder color (empty hex) on the
// backend — that must never render as a swatch.
function hasShades(p) {
  return (p.colors || []).some(c => c.hex && String(c.hex).trim());
}

// ── Render full product detail
function renderDetail(p) {
  const images  = getColorImages(p, selectedColorIdx);
  const mainSrc = images[0] || null;

  const badge = p.badge
    ? `<span class="badge ${p.badge==='sale'?'badge-gold':p.badge==='new'?'badge-green':'badge-rose'}">${p.badge}</span>`
    : '';

  const priceHTML = p.oldPrice
    ? `<span class="old-price">${Number(p.oldPrice).toFixed(2)} EGP</span> ${Number(p.finalPrice).toFixed(2)} EGP`
    : `${Number(p.finalPrice).toFixed(2)} EGP`;

  const detailsList = (p.details || []).length
    ? `<ul class="product-details-list">${p.details.map(d => `<li>${d}</li>`).join('')}</ul>`
    : '';

  const colorsHTML = hasShades(p)
    ? `<div class="color-section">
        <h4>
          Shade:
          <span id="selected-color-name" style="color:var(--rose);font-weight:600">
            ${p.colors[selectedColorIdx]?.name || ''}
          </span>
        </h4>
        <div class="color-dots">
          ${p.colors.map((c, i) => `
            <div class="color-dot ${i === selectedColorIdx ? 'selected' : ''}"
              style="background:${c.hex || '#C8506E'}"
              title="${c.name}"
              onclick="selectColor(${i})">
            </div>`).join('')}
        </div>
      </div>`
    : '';

  const thumbsHTML = images.length > 1
    ? images.map((src, i) => `
        <div class="gallery-thumb ${i === 0 ? 'active' : ''}"
          onclick="setMainImg(this, '${src}')">
          <img src="${src}" alt="View ${i + 1}">
        </div>`).join('')
    : '';

  const stockLabel = p.stock <= 0
    ? `<span class="product-stock out-of-stock">Out of Stock</span>`
    : p.stock <= 10
      ? `<span class="product-stock low-stock">Only ${p.stock} left!</span>`
      : `<span class="product-stock in-stock">✓ In Stock</span>`;

  document.getElementById('product-detail-area').innerHTML = `
    <div class="product-detail-grid">

      <!-- GALLERY -->
      <div class="product-gallery">
        <div class="gallery-main" id="gallery-main">
          ${mainSrc
            ? `<img src="${mainSrc}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover">`
            : `<span style="font-size:9rem">${p.emoji || '✨'}</span>`}
        </div>
        ${thumbsHTML
          ? `<div class="gallery-thumbs" id="gallery-thumbs">${thumbsHTML}</div>`
          : ''}
      </div>

      <!-- INFO -->
      <div class="product-detail-info reveal">
        <div class="product-brand">${p.brand || 'DomDom'}</div>
        <h1 style="font-size:clamp(1.8rem,3vw,2.5rem);margin-bottom:.5rem">${p.name}</h1>

        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1rem">
          ${badge}
          <div class="stars" style="font-size:1rem">
            ${'★'.repeat(Math.round(p.rating || 0))}${'☆'.repeat(5 - Math.round(p.rating || 0))}
            <span>(${p.reviewCount || 0} reviews)</span>
          </div>
          ${stockLabel}
        </div>

        <div class="product-price-big" style="font-size:2rem;font-weight:700;margin-bottom:1rem">
          ${priceHTML}
        </div>

        <p style="font-size:.95rem;color:var(--muted);line-height:1.8;margin-bottom:1.2rem">
          ${p.description || ''}
        </p>

        ${detailsList}
        ${colorsHTML}

        <!-- Quantity -->
        <div class="qty-section" style="margin-bottom:1.5rem">
          <h4 style="font-size:.82rem;font-weight:500;margin-bottom:.6rem">Quantity</h4>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <span class="qty-val" id="qty-display">1</span>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
        </div>

        <!-- Actions -->
        <div class="action-row" style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem">
          <button class="btn btn-primary" id="add-cart-main"
            onclick="addToCartMain()" ${p.stock <= 0 ? 'disabled' : ''}
            style="flex:1;justify-content:center;min-width:160px">
            ${p.stock <= 0 ? 'Out of Stock' : '🛍 Add to Cart'}
          </button>
          <button class="btn btn-outline" id="wish-main-btn"
            onclick="wishToggleMain()"
            style="min-width:120px;justify-content:center">
            🤍 Wishlist
          </button>
        </div>

        <!-- Trust badges -->
        <div style="display:flex;gap:1rem;font-size:.8rem;color:var(--muted);flex-wrap:wrap;margin-bottom:1rem">
          <span>💵 Cash on Delivery</span>
          <span>🚚 Free shipping over <span class="free-ship-amount">3000</span>EGP</span>
          <span>↩️ 30-day returns</span>
          <span>🌿 Cruelty-free</span>
        </div>

        <!-- Tags -->
        <div style="display:flex;gap:.4rem;flex-wrap:wrap">
          <span class="tag">${p.category}</span>
          ${p.badge ? `<span class="tag">${p.badge}</span>` : ''}
          <span class="tag">cruelty-free</span>
          <span class="tag">vegan</span>
        </div>
      </div>
    </div>`;
}

// ── Color selection — switches gallery images
function selectColor(idx) {
  selectedColorIdx = idx;
  const colors = product.colors || [];
  const nameEl = document.getElementById('selected-color-name');
  if (nameEl) nameEl.textContent = colors[idx]?.name || '';

  document.querySelectorAll('.color-dot').forEach((d, i) =>
    d.classList.toggle('selected', i === idx));

  const images = getColorImages(product, idx);
  const main   = document.getElementById('gallery-main');

  if (images[0]) {
    main.innerHTML = `<img src="${images[0]}" alt="${product.name}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    main.innerHTML = `<span style="font-size:9rem">${product.emoji || '✨'}</span>`;
  }

  // Refresh thumbs
  const thumbsEl = document.getElementById('gallery-thumbs');
  if (thumbsEl && images.length > 1) {
    thumbsEl.innerHTML = images.map((src, i) => `
      <div class="gallery-thumb ${i === 0 ? 'active' : ''}" onclick="setMainImg(this,'${src}')">
        <img src="${src}" alt="thumb">
      </div>`).join('');
  }
}

function setMainImg(thumb, src) {
  document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
  thumb.classList.add('active');
  const main = document.getElementById('gallery-main');
  main.innerHTML = `<img src="${src}" alt="product" style="width:100%;height:100%;object-fit:cover">`;
}

function changeQty(delta) {
  qty = Math.max(1, Math.min(product.stock || 99, qty + delta));
  document.getElementById('qty-display').textContent = qty;
}

// ── Add to cart
function addToCartMain() {
  if (!product) return;
  const selColor  = product.colors?.[selectedColorIdx] || null;
  const colorName = selColor?.name || '';
  // Attach the selected variant (id + name) so the cart treats each color
  // as its own line and stores the matching color image.
  const productToAdd = Object.assign({}, product, {
    selectedColor:     colorName,
    selectedVariantId: selColor ? String(selColor._id || selColor.id || '') : ''
  });
  Cart.add(productToAdd, qty);

  const btn = document.getElementById('add-cart-main');
  const orig = btn.textContent;
  btn.textContent = '✓ Added!';
  btn.style.background = 'var(--success)';
  setTimeout(() => {
    btn.textContent = orig;
    btn.style.background = '';
  }, 1800);
}

// ── Wishlist toggle
async function wishToggleMain() {
  if (!Auth.isLoggedIn()) {
    Auth.openModal('login');
    Toast.show('Login to save to wishlist', 'info');
    return;
  }
  try {
    const id = String(product._id || product.id);
    const d  = await API.toggleWishlist(id);
    const btn = document.getElementById('wish-main-btn');
    if (d.action === 'added') {
      btn.textContent = '❤️ Wishlisted';
      btn.style.background = 'var(--rose-light)';
    } else {
      btn.textContent = '🤍 Wishlist';
      btn.style.background = '';
    }
    Toast.show(d.action === 'added' ? 'Added to wishlist 💕' : 'Removed from wishlist', 'info');
  } catch (e) {
    Toast.show(e.message, 'error');
  }
}

// ── Reviews
async function loadReviews(productId) {
  try {
    const d = await API.getReviews(productId);
    renderReviewSummary(d.reviews);
    renderReviewsList(d.reviews);
    bindReviewForm(productId);
  } catch {}
}

function renderReviewSummary(reviews) {
  const avg    = reviews.length
    ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1)
    : 0;
  const counts = [5, 4, 3, 2, 1].map(n => ({
    n,
    count: reviews.filter(r => r.rating === n).length
  }));

  document.getElementById('reviews-summary').innerHTML = `
    <div style="text-align:center;padding:0 1.5rem">
      <div class="rating-big">${avg}</div>
      <div class="rating-stars-big">${'★'.repeat(Math.round(avg))}${'☆'.repeat(5 - Math.round(avg))}</div>
      <div style="font-size:.8rem;color:var(--muted);margin-top:.3rem">${reviews.length} reviews</div>
    </div>
    <div class="review-bars">
      ${counts.map(c => `
        <div class="review-bar-row">
          <span class="review-bar-label">${c.n}★</span>
          <div class="review-bar-track">
            <div class="review-bar-fill"
              style="width:${reviews.length ? Math.round(c.count / reviews.length * 100) : 0}%">
            </div>
          </div>
          <span class="review-bar-count">${c.count}</span>
        </div>`).join('')}
    </div>`;
}

function renderReviewsList(reviews) {
  const list = document.getElementById('reviews-list');
  if (!reviews.length) {
    list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:1.5rem">No reviews yet — be the first!</p>';
    return;
  }
  list.innerHTML = reviews.map(r => `
    <div class="review-card">
      <div class="review-card-header">
        <div class="reviewer-avatar">${r.avatar || '👤'}</div>
        <div>
          <div class="reviewer-name">${esc(r.author)}</div>
          <div class="reviewer-date">
            ${new Date(r.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}
          </div>
        </div>
        <div class="stars" style="margin-left:auto">
          ${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}
        </div>
      </div>
      <p class="review-text">"${esc(r.text)}"</p>
    </div>`).join('');
}

function bindReviewForm(productId) {
  document.getElementById('write-review-btn').addEventListener('click', () => {
    if (!Auth.isLoggedIn()) {
      Auth.openModal('login');
      Toast.show('Login to write a review', 'info');
      return;
    }
    const wrap = document.getElementById('review-form-wrap');
    wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
  });

  document.querySelectorAll('.star-pick').forEach(star => {
    star.addEventListener('click', () => {
      selectedRating = parseInt(star.dataset.v);
      document.querySelectorAll('.star-pick').forEach((s, i) => {
        s.textContent = i < selectedRating ? '★' : '☆';
        s.style.color = i < selectedRating ? 'var(--gold)' : 'var(--muted)';
      });
    });
    star.addEventListener('mouseover', () => {
      const v = parseInt(star.dataset.v);
      document.querySelectorAll('.star-pick').forEach((s, i) =>
        s.textContent = i < v ? '★' : '☆');
    });
    star.addEventListener('mouseout', () => {
      document.querySelectorAll('.star-pick').forEach((s, i) =>
        s.textContent = i < selectedRating ? '★' : '☆');
    });
  });

  document.getElementById('submit-review-btn').addEventListener('click', async () => {
    const text = document.getElementById('review-text').value.trim();
    if (!selectedRating) return Toast.show('Please select a star rating', 'error');
    if (!text)           return Toast.show('Please write your review', 'error');

    const btn = document.getElementById('submit-review-btn');
    btn.disabled = true; btn.textContent = 'Submitting…';
    try {
      await API.addReview({ productId, rating: selectedRating, text });
      Toast.show('Review submitted! Thank you 🌸', 'success');
      document.getElementById('review-text').value = '';
      selectedRating = 0;
      document.querySelectorAll('.star-pick').forEach(s => {
        s.textContent = '☆'; s.style.color = '';
      });
      document.getElementById('review-form-wrap').style.display = 'none';
      await loadReviews(productId);
    } catch (e) { Toast.show(e.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Submit Review'; }
  });
}

// ── Related products
function renderRelated(products) {
  if (!products.length) return;
  document.getElementById('related-grid').innerHTML = products.map(p => {
    const id    = String(p._id || p.id);
    const img   = getProductImage(p);
    const thumb = img
      ? `<img src="${img}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover">`
      : `<span class="no-photo">${p.emoji || '✨'}</span>`;

    return `<div class="product-card reveal">
      <div class="product-img" onclick="window.location='${productUrl(p)}'">${thumb}</div>
      <div class="product-info">
        <div class="product-brand">${p.brand || 'DomDom'}</div>
        <div class="product-name" onclick="window.location='${productUrl(p)}'">${p.name}</div>
        <div class="stars">
          ${'★'.repeat(Math.round(p.rating || 0))}
          <span>(${p.reviewCount || 0})</span>
        </div>
        <div class="product-footer">
          <div class="product-price">${Number(p.finalPrice).toFixed(2)} EGP</div>
          <button class="add-cart-btn" onclick="Cart.add(${JSON.stringify({
            _id: p._id, name: p.name, emoji: p.emoji,
            finalPrice: p.finalPrice, colors: p.colors
          })})">+ Add</button>
        </div>
      </div>
    </div>`;
  }).join('');
  initReveal();
}
</script>
</body>
</html>
