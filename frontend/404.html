<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,follow">
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="apple-touch-icon" href="/images/favicon.png">
<title>Page Not Found — DomDom Store</title>
<link rel="canonical" href="https://domdom-store.com/404">
<meta property="og:title" content="Page Not Found — DomDom Store">
<meta property="og:type" content="website">
<meta property="og:site_name" content="DomDom Store">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/nav.css">
<style>
.nf-wrap{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8rem 1.5rem 4rem}
.nf-code{font-family:'Playfair Display',serif;font-size:clamp(5rem,18vw,11rem);line-height:1;color:var(--rose);margin-bottom:.5rem}
.nf-wrap h1{font-size:clamp(1.4rem,4vw,2rem);margin-bottom:.75rem}
.nf-wrap p{color:var(--muted);max-width:440px;line-height:1.8;margin-bottom:2rem}
.nf-actions{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>
<nav id="main-nav"></nav>

<div class="nf-wrap">
  <div class="nf-code">404</div>
  <h1>This page wandered off ✨</h1>
  <p>The page you’re looking for doesn’t exist or has moved. Let’s get you back to the good stuff.</p>
  <div class="nf-actions">
    <a href="/" class="btn btn-primary">← Back Home</a>
    <a href="/shop" class="btn btn-outline">Browse the Shop →</a>
  </div>
</div>

<footer id="main-footer"></footer>
<div id="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/layout.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => initLayout());</script>
</body>
</html>
